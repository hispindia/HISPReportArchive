<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0-alpha.6/css/bootstrap.min.css"
    integrity="sha384-rwoIResjU2yc3z8GV/NPeZWAv56rSmLldC3R/AZzGRnGxQQKnKkoFVhFQhNUwEyJ" crossorigin="anonymous">


<style>
    .reporttable {
        text-align: center;
    }

    /* Absolute Center Spinner */

    .loading {
        position: fixed;
        z-index: 999;
        height: 2em;
        width: 2em;
        overflow: show;
        margin: auto;
        top: 0;
        left: 0;
        bottom: 0;
        right: 0;
        display: none;
    }

    /* Transparent Overlay */

    .loading:before {
        content: '';
        display: block;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.3);
    }

    /* :not(:required) hides these rules from IE9 and below */

    .loading:not(:required) {
        /* hide "loading..." text */
        font: 0/0 a;
        color: transparent;
        text-shadow: none;
        background-color: transparent;
        border: 0;
    }

    .loading:not(:required):after {
        content: '';
        display: block;
        font-size: 10px;
        width: 1em;
        height: 1em;
        margin-top: -0.5em;
        -webkit-animation: spinner 1500ms infinite linear;
        -moz-animation: spinner 1500ms infinite linear;
        -ms-animation: spinner 1500ms infinite linear;
        -o-animation: spinner 1500ms infinite linear;
        animation: spinner 1500ms infinite linear;
        border-radius: 0.5em;
        -webkit-box-shadow: rgba(0, 0, 0, 0.75) 1.5em 0 0 0, rgba(0, 0, 0, 0.75) 1.1em 1.1em 0 0, rgba(0, 0, 0, 0.75) 0 1.5em 0 0, rgba(0, 0, 0, 0.75) -1.1em 1.1em 0 0, rgba(0, 0, 0, 0.5) -1.5em 0 0 0, rgba(0, 0, 0, 0.5) -1.1em -1.1em 0 0, rgba(0, 0, 0, 0.75) 0 -1.5em 0 0, rgba(0, 0, 0, 0.75) 1.1em -1.1em 0 0;
        box-shadow: rgba(0, 0, 0, 0.75) 1.5em 0 0 0, rgba(0, 0, 0, 0.75) 1.1em 1.1em 0 0, rgba(0, 0, 0, 0.75) 0 1.5em 0 0, rgba(0, 0, 0, 0.75) -1.1em 1.1em 0 0, rgba(0, 0, 0, 0.75) -1.5em 0 0 0, rgba(0, 0, 0, 0.75) -1.1em -1.1em 0 0, rgba(0, 0, 0, 0.75) 0 -1.5em 0 0, rgba(0, 0, 0, 0.75) 1.1em -1.1em 0 0;
    }

    /* Animation */

    @-webkit-keyframes spinner {
        0% {
            -webkit-transform: rotate(0deg);
            -moz-transform: rotate(0deg);
            -ms-transform: rotate(0deg);
            -o-transform: rotate(0deg);
            transform: rotate(0deg);
        }

        100% {
            -webkit-transform: rotate(360deg);
            -moz-transform: rotate(360deg);
            -ms-transform: rotate(360deg);
            -o-transform: rotate(360deg);
            transform: rotate(360deg);
        }
    }

    @-moz-keyframes spinner {
        0% {
            -webkit-transform: rotate(0deg);
            -moz-transform: rotate(0deg);
            -ms-transform: rotate(0deg);
            -o-transform: rotate(0deg);
            transform: rotate(0deg);
        }

        100% {
            -webkit-transform: rotate(360deg);
            -moz-transform: rotate(360deg);
            -ms-transform: rotate(360deg);
            -o-transform: rotate(360deg);
            transform: rotate(360deg);
        }
    }

    @-o-keyframes spinner {
        0% {
            -webkit-transform: rotate(0deg);
            -moz-transform: rotate(0deg);
            -ms-transform: rotate(0deg);
            -o-transform: rotate(0deg);
            transform: rotate(0deg);
        }

        100% {
            -webkit-transform: rotate(360deg);
            -moz-transform: rotate(360deg);
            -ms-transform: rotate(360deg);
            -o-transform: rotate(360deg);
            transform: rotate(360deg);
        }
    }

    @keyframes spinner {
        0% {
            -webkit-transform: rotate(0deg);
            -moz-transform: rotate(0deg);
            -ms-transform: rotate(0deg);
            -o-transform: rotate(0deg);
            transform: rotate(0deg);
        }

        100% {
            -webkit-transform: rotate(360deg);
            -moz-transform: rotate(360deg);
            -ms-transform: rotate(360deg);
            -o-transform: rotate(360deg);
            transform: rotate(360deg);
        }
    }

    button {
        cursor: pointer;
    }
</style>

<div class="loading" id="loader"></div>

<a id="dlink" style="display:none;"></a>
<div id="main">
    <div style="width: 40%; margin-left:30%;">
        <table class="table table-striped table-bordered">

            <tr style="border: 1px solid #DDDDDD;">
                <td style="font-size: 15px;padding-top: 15px;">
                    Start Month :
                </td>
                <td style="width: 60%;">
                    <input type="month" class=" form-control" id="start-date">
                </td>
            </tr>
            <tr style="border: 1px solid #DDDDDD;">
                <td style="font-size: 15px;padding-top: 15px;">
                    End Month :
                </td>
                <td style="width: 60%;">
                    <input type="month" class=" form-control" id="end-date">
                </td>
            </tr>
            <tr>
                <td><button onClick="submit()" class="btn btn-primary" id="tap">Submit</button></td>
                <td style="text-align: right;">
                    <img src="https://img.icons8.com/color/35/000000/ms-excel.png"
                        onmouseover="this.style.cursor='pointer'"
                        onclick="tableToExcel('report_table', 'HIV OI Report', 'HIV OI Report')"
                        alt="xls" style="cursor: pointer;">
                </td>
            </tr>
        </table>
    </div>
    <br>
    <table class="table table-bordered table-striped table-hover reporttable" width="100%" id="report_table"
        style="visibility:hidden">
        <tbody id="tableBody">
        </tbody>
    </table>
</div>

<script>

    var selectedOrgUnit = dhis2.report.organisationUnit;
    var months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

    var dataElementIds = [
        'wAW5CCMR7Lk', 'pZkJwl0cSd4', 'xvlprRYgglh', 'tQYg2KQitB5', 'J38uhpBYIpf', 'hUEQ5AT7kMt', 'fbMM7Y7s5XC', 'bGs2manVcr9', 'PO1Gzcil7TI', 'PMAlQW6M5CZ', 'N6GwBo4GhUc',
        'XQVCpCyl20G', 'vKVmea1iqZc', 'H0m7p3uM9KY', 'dCamttwAZ9K', 'g8nsFn5ifTB', 'zgxEqgBONBz', 'cWyBnQvZ6ak', 'R27qkkZ1V4G', 'RIEXIG96Bqc', 'c2yNNKpA8bw', 'TrjqDUbCCnx',
        'Ynjnkv4OUxA', 'Go3QuAwPO0L', 'Owt699b03Ac', 'oLm83VR5HTu', 'Jwly5OCtw6l', 'zfqZry6EZJV', 'tbSVkLu6NJx', 'VQlS8fKP9h2', 'GLmPc5wlO42', 'B2GYTDkFTGe', 'HA1TT1y8aSs',
        'm3Ml23UhZ6V', 'BQV2WVDwTkK', 'FuJ0A5jNnvA', 'YDEqdMsWcI4', 'Y6tak3i9BLZ', 'MWFCFfKbIdZ', 'TVmfQDOcbKE', 'pgfC7WMW8UN', 'iDf4QJeWLRQ', 'ulvd2jOHSL7', 'gWsY6IOmLu6',
        'MWIk8md9RTh', 'd4UcMf9z6Uk', 'xvOeLbT9HLy', 'tUvlp8tZcCS', 'NyDYEDrm7RH', 'u6Y0Jaoq6Pr', 'uttZwv3bx1D', 'lFRV65qepJA', 'jNRY8nkX0wI', 'soOJyofsRVF', 'YK7FgoWdjCj',
        'bBOjPWPn5jW', 'Z1bzumVzXLk', 'gRLVTL9RnHx', 'BHwTkyC2IIu', 'thXJbk9coaC', 'yTOjITABebn', 'CWGnoZdxhpe', 'P82lGU67J7x', 'v5IYVq3IJWb', 'EHF1ZY4oMNT', 't2BUbdhifoI'
    ]

    function submit() {

        document.getElementById("loader").style.display = "block";
        document.getElementById("report_table").style.visibility = "hidden";
        document.getElementById("tableBody").innerHTML = "";

        var startMonth = document.getElementById("start-date").value;
        var month = document.getElementById("end-date").value;
        var endMonth = (month) => {
            month = new Date(month);
            return `${month.getFullYear()}-${('00' + (month.getMonth() + 1)).slice(-2)}-` + new Date(month.getFullYear(), month.getMonth() + 1, 0).getDate();
        }

        var data = {
            startDate: startMonth + '-01',
            endDate: endMonth(month)
        }

        $('#loader').show();
        setTimeout(function () {
            getData(data);
        }, 1000);

        async function getData(data) {

            var getBetweenDates = function (startDate, endDate) {
                var arr = [], lastDay, start, end;
                var startYear = startDate.split("-");
                var endYear = endDate.split("-");

                for (var i = parseInt(startYear["0"]); i <= parseInt(endYear["0"]); i++) {

                    startMonth = (i > parseInt(startYear["0"])) ? 1 : parseInt(startYear["1"]);
                    endMonth = (i == endYear["0"]) ? endYear["1"] : 12;

                    for (var j = startMonth; j <= endMonth; j++) {
                        let month = j < 10 ? i + "0" + j : i + "" + j;
                        arr.push(month);
                    }
                }

                return arr;
            }

            //getting between dates
            var smToEm = getBetweenDates(data.startDate, data.endDate);
            var dv = {};

            var res = await (await fetch(`../api/analytics.json?dimension=ou:${selectedOrgUnit.id}&dimension=dx:${dataElementIds.join(";")}&dimension=pe:${smToEm.join(";")}&displayProperty=NAME`)).json();
            res.rows.forEach(data => {

                if (!dv[data[0]]) dv[data[0]] = Number(data[3]);
                else dv[data[0]] += Number(data[3]);
            })
            debugger;
            var tableBody = `<tr><td style="font-weight:400; border-bottom:1px solid white; background: rgb(39, 102, 150);font-size:20px; color:white; text-align: center;" colspan="22">HIV OI Report <br/> ${selectedOrgUnit.name} <br> Period:  ${months[Number((data.startDate.split("-")[1]) - 1)]} ${data.startDate.split("-")[0]} to ${months[Number((data.endDate.split("-")[1]) - 1)]} ${data.endDate.split("-")[0]} </td></tr>
            <tr>
                <td colspan="2" style="border:1px solid black;background-color:#F8F8F8;text-align:center" >Opportunistic Infections</td>
                <td  style="border:1px solid black;background-color:#F8F8F8;text-align:center" >Bacterial Pneumonia	</td>
                <td  style="border:1px solid black;background-color:#F8F8F8;text-align:center" >TB</td>
                <td  style="border:1px solid black;background-color:#F8F8F8;text-align:center" >Candidiasis</td>
                <td  style="border:1px solid black;background-color:#F8F8F8;text-align:center" >Diarrhoea</td>
                <td  style="border:1px solid black;background-color:#F8F8F8;text-align:center" > Cryptococcal Meningitis</td>
                <td  style="border:1px solid black;background-color:#F8F8F8;text-align:center" >PCP*</td>
                <td  style="border:1px solid black;background-color:#F8F8F8;text-align:center" >Cytomegato Virus</td>
                <td  style="border:1px solid black;background-color:#F8F8F8;text-align:center" >Herpes Zoster</td>
                <td  style="border:1px solid black;background-color:#F8F8F8;text-align:center" >Genital Herpes</td>
                <td  style="border:1px solid black;background-color:#F8F8F8;text-align:center" >Toxo- plasmosisy</td>
                <td  style="border:1px solid black;background-color:#F8F8F8;text-align:center" >Others</td>
            </tr>`;
            let counter = 0;
            let count = 0;
            ["Diagnosed", "Treated"].forEach(state => {
                tableBody += `<tr><td rowspan="3">${state}</td>`;
                ["Male", "Female", "TG"].forEach((gender, index) => {
                    tableBody += index == 0 ? `<td>${gender}</td>` : `<tr><td>${gender}</td>`;
                    for (let i = counter; i < 11 + counter; i++) {
                        count++;
                        tableBody += `<td>${(dv[dataElementIds[i]] ? dv[dataElementIds[i]] : "")}</td>`;
                    }
                    counter = count++;
                })
            })

            document.getElementById('tableBody').innerHTML = tableBody;
            document.getElementById('report_table').style.visibility = "visible";
            document.getElementById('loader').style.display = "none";
        }

    }


    var tableToExcel = (function () {
        var uri = 'data:application/vnd.ms-excel;base64,'
            , template = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40"><head><!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet><x:Name>{worksheet}</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]--></head><body><table>{table}</table></body></html>'
            , base64 = function (s) { return window.btoa(unescape(encodeURIComponent(s))) }
            , format = function (s, c) { return s.replace(/{(\w+)}/g, function (m, p) { return c[p]; }) }
        return function (table, name, filename) {
            if (!table.nodeType) table = document.getElementById(table)
            var ctx = { worksheet: name || 'Worksheet', table: table.innerHTML }
            document.getElementById("dlink").href = uri + base64(format(template, ctx));
            document.getElementById("dlink").download = filename + selectedOrgUnit.name + ".xls";
            document.getElementById("dlink").click();
        }
    })()

</script>
